<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulsar — Știri în timp real</title>
<style>
  :root{
    --bg: #0a0e14;
    --bg-elevated: #10151f;
    --line: #1f2733;
    --text: #e7ecf3;
    --text-dim: #8a96a8;
    --accent: #00e6a8;
    --accent-dim: #0a3d33;
    --warn: #ff5c5c;
    --font-display: 'Space Grotesk', 'Segoe UI', sans-serif;
    --font-body: 'Inter', 'Segoe UI', sans-serif;
    --font-mono: 'JetBrains Mono', 'Consolas', monospace;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    line-height: 1.6;
  }

  /* ---------- HEADER ---------- */
  header{
    border-bottom: 1px solid var(--line);
    background: var(--bg-elevated);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .header-inner{
    max-width: 1200px;
    margin: 0 auto;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  .logo{
    font-family: var(--font-display);
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo .dot{
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse{
    0%,100%{ opacity:1; transform:scale(1); }
    50%{ opacity:0.4; transform:scale(0.8); }
  }

  .clock{
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--text-dim);
    text-align: right;
  }

  .clock .label{
    color: var(--accent);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 2px;
  }

  nav{
    display: flex;
    gap: 4px;
    overflow-x: auto;
    padding: 0 24px 14px;
    max-width: 1200px;
    margin: 0 auto;
  }

  nav button{
    background: none;
    border: 1px solid transparent;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    text-transform: uppercase;
  }

  nav button:hover{
    color: var(--text);
    border-color: var(--line);
  }

  nav button.active{
    color: var(--accent);
    background: var(--accent-dim);
    border-color: var(--accent);
  }

  /* ---------- MAIN ---------- */
  main{
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px 100px;
  }

  .status-bar{
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
  }

  .status-bar .live{
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .live-dot{
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  #refresh-btn{
    margin-left: auto;
    background: var(--bg-elevated);
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 0.75rem;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  #refresh-btn:hover{
    color: var(--accent);
    border-color: var(--accent);
  }

  /* ---------- ARTICLE GRID ---------- */
  .grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }

  .card{
    background: var(--bg-elevated);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.25s, transform 0.25s;
    display: flex;
    flex-direction: column;
  }

  .card:hover{
    border-color: var(--accent);
    transform: translateY(-3px);
  }
  .card-img{
    width: 100%;
    height: 170px;
    object-fit: cover;
    background: linear-gradient(135deg, #161e2c, #0d121c);
    display: block;
  }

  .card-body{
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }

  .card-tag{
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .card-title{
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-weight: 600;
    line-height: 1.35;
    color: var(--text);
  }

  .card-summary{
    font-size: 0.88rem;
    color: var(--text-dim);
    flex: 1;
  }

  .card-meta{
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    border-top: 1px solid var(--line);
    padding-top: 10px;
    margin-top: 4px;
  }

  .card-meta a{
    color: var(--text-dim);
    text-decoration: none;
  }

  .card-meta a:hover{
    color: var(--accent);
  }

  .empty, .loading{
    text-align: center;
    color: var(--text-dim);
    font-family: var(--font-mono);
    padding: 60px 20px;
    font-size: 0.9rem;
  }

  .loading::after{
    content: '';
    display: inline-block;
    width: 14px; height: 14px;
    margin-left: 10px;
    border: 2px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
  }

  @keyframes spin{ to{ transform: rotate(360deg); } }

  /* ---------- CHATBOT ---------- */
  #chat-toggle{
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(0,230,168,0.35);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
  }

  #chat-toggle:hover{ transform: scale(1.08); }

  #chat-window{
    position: fixed;
    bottom: 92px;
    right: 24px;
    width: min(360px, calc(100vw - 32px));
    height: min(480px, calc(100vh - 140px));
    background: var(--bg-elevated);
    border: 1px solid var(--line);
    border-radius: 14px;
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 100;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }

  #chat-window.open{ display: flex; }

  .chat-header{
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 0.95rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .chat-header span.sub{
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--accent);
    font-weight: 400;
  }

  #chat-close{
    background: none; border: none; color: var(--text-dim);
    font-size: 1.2rem; cursor: pointer; line-height: 1;
  }

  .chat-messages{
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .msg{
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 0.88rem;
    line-height: 1.5;
  }

  .msg.user{
    align-self: flex-end;
    background: var(--accent-dim);
    color: var(--text);
    border: 1px solid var(--accent);
  }

  .msg.bot{
    align-self: flex-start;
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--text);
  }

  .msg.bot.thinking{
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 0.8rem;
  }

  .chips{
    display: flex;
    gap: 6px;
    padding: 0 16px 10px;
    flex-wrap: wrap;
  }

  .chip{
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-size: 0.72rem;
    padding: 5px 10px;
    border-radius: 999px;
    cursor: pointer;
    font-family: var(--font-mono);
    transition: all 0.2s;
  }
  .chip:hover{ color: var(--accent); border-color: var(--accent); }

  .chat-input{
    border-top: 1px solid var(--line);
    display: flex;
    padding: 10px;
    gap: 8px;
  }

  .chat-input input{
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 0.88rem;
    font-family: var(--font-body);
  }

  .chat-input input:focus{ outline: none; border-color: var(--accent); }

  .chat-input button{
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 0 16px;
    cursor: pointer;
    font-weight: 600;
  }

  /* ---------- MODAL ---------- */
  #modal-overlay{
    position: fixed;
    inset: 0;
    background: rgba(5,8,13,0.8);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
  }

  #modal-overlay.open{ display: flex; }

  #modal{
    background: var(--bg-elevated);
    border: 1px solid var(--line);
    border-radius: 12px;
    max-width: 640px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 28px;
    position: relative;
  }

  #modal-close{
    position: absolute;
    top: 16px; right: 16px;
    background: none; border: none;
    color: var(--text-dim);
    font-size: 1.4rem;
    cursor: pointer;
  }

  #modal h2{
    font-family: var(--font-display);
    margin-bottom: 8px;
    padding-right: 30px;
  }

  #modal .modal-tag{
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 14px;
    display: block;
  }

  #modal .modal-body{
    color: var(--text-dim);
    font-size: 0.95rem;
  }

  #modal .modal-link{
    display: inline-block;
    margin-top: 18px;
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 0.8rem;
    text-decoration: none;
    border: 1px solid var(--accent);
    padding: 8px 16px;
    border-radius: 6px;
  }

  #modal .modal-link:hover{ background: var(--accent-dim); }

  footer{
    border-top: 1px solid var(--line);
    text-align: center;
    padding: 24px;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--text-dim);
  }

  @media (max-width: 600px){
    .header-inner{ flex-direction: column; align-items: flex-start; gap: 10px; }
    .clock{ text-align: left; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="#" class="logo"><span class="dot"></span>Pulsar</a>
    <div class="clock">
      <span class="label">Actualizat la</span>
      <span id="clock-time">--:--:--</span>
    </div>
  </div>
  <nav id="categories">
    <button class="active" data-cat="general">Toate</button>
    <button data-cat="technology">Tehnologie</button>
    <button data-cat="business">Economie</button>
    <button data-cat="science">Știință</button>
    <button data-cat="sports">Sport</button>
    <button data-cat="entertainment">Cultură</button>
    <button data-cat="health">Sănătate</button>
  </nav>
</header>

<main>
  <div class="status-bar">
    <span class="live"><span class="live-dot"></span>LIVE</span>
    <span id="article-count">— articole</span>
    <button id="refresh-btn">↻ Reîmprospătează</button>
  </div>

  <div id="grid" class="grid">
    <div class="loading">Se încarcă știrile</div>
  </div>
</main>

<footer>
  PULSAR — sursă: NewsData.io · actualizare automată zilnică · 2026
</footer>

<!-- Chatbot -->
<button id="chat-toggle" aria-label="Deschide asistentul">💬</button>
<div id="chat-window">
  <div class="chat-header">
    <span>Asistent Pulsar <span class="sub">AI</span></span>
    <button id="chat-close">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="msg bot">Salut! Te pot ajuta să găsești sau să înțelegi mai bine știrile de pe Pulsar. Întreabă-mă orice.</div>
  </div>
  <div class="chips">
    <button class="chip" data-q="Rezumă-mi ultimele știri din tehnologie">Rezumă tehnologie</button>
    <button class="chip" data-q="Ce se întâmplă important în lume azi?">Ce e important azi?</button>
    <button class="chip" data-q="Explică-mi simplu o știre complicată">Explică simplu</button>
  </div>
  <div class="chat-input">
    <input type="text" id="chat-input" placeholder="Scrie un mesaj...">
    <button id="chat-send">Trimite</button>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close">✕</button>
    <span class="modal-tag" id="modal-tag">CATEGORIE</span>
    <h2 id="modal-title">Titlu</h2>
    <div class="modal-body" id="modal-body">Conținut</div>
    <a href="#" target="_blank" class="modal-link" id="modal-link">Vezi sursa originală →</a>
  </div>
</div>

<script>
/* ============ CONFIG ============ */
// NOTE: Pentru date reale, înlocuiește cu propriul API key de la newsdata.io (gratuit).
// Documentație: https://newsdata.io/documentation
// Lasă gol "" cât nu ai o cheie reală — site-ul va folosi automat știri demo.
// Cheie gratuită: https://newsdata.io/register
const NEWS_API_KEY = "const NEWS_API_KEY = "pub_451f41a9a52e4cd6824e492eb2bc98d1";";
const NEWS_API_BASE = "https://newsdata.io/api/1/latest";

const grid = document.getElementById('grid');
const articleCount = document.getElementById('article-count');
const clockTime = document.getElementById('clock-time');
let currentCategory = 'general';
let lastArticles = [];
  /* ============ CEAS ============ */
function updateClock(){
  const now = new Date();
  clockTime.textContent = now.toLocaleString('ro-RO', {
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
}
updateClock();
setInterval(updateClock, 1000);

/* ============ ȘTIRI ============ */
async function loadNews(category){
  grid.innerHTML = '<div class="loading">Se încarcă știrile</div>';

  if(!NEWS_API_KEY){
    lastArticles = demoArticles(category);
    renderArticles(lastArticles, true);
    return;
  }

  try {
    const url = `${NEWS_API_BASE}?apikey=${NEWS_API_KEY}&language=ro&category=${category}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('API indisponibil');
    const data = await res.json();

    if(!data.results || data.results.length === 0){
      throw new Error('Fără rezultate');
    }

    lastArticles = data.results;
    renderArticles(lastArticles);
  } catch(err){
    lastArticles = demoArticles(category);
    renderArticles(lastArticles, true);
  }
}

function renderArticles(articles, isDemo = false){
  grid.innerHTML = '';
  articleCount.textContent = `${articles.length} articole${isDemo ? ' (demo — adaugă o cheie API pentru date reale)' : ''}`;

  articles.forEach((a, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img class="card-img" src="${a.image_url || ''}" onerror="this.style.display='none'" alt="">
      <div class="card-body">
        <span class="card-tag">${(a.category && a.category[0]) || currentCategory}</span>
        <div class="card-title">${escapeHtml(a.title)}</div>
        <div class="card-summary">${escapeHtml((a.description || '').slice(0, 120))}${(a.description||'').length > 120 ? '…' : ''}</div>
        <div class="card-meta">
          <span>${a.source_id || a.source_name || 'sursă'}</span>
          <span>${formatDate(a.pubDate)}</span>
        </div>
      </div>
    `;
    card.addEventListener('click', () => openModal(a));
    grid.appendChild(card);
  });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function formatDate(d){
  if(!d) return '';
  try{
    return new Date(d).toLocaleDateString('ro-RO', { day:'2-digit', month:'short' });
  } catch{ return ''; }
}

/* ============ DATE DEMO (fallback fără API key) ============ */
function demoArticles(category){
  const base = [
    { title: "Configurare necesară: adaugă cheia API NewsData.io", description: "Acest panou afișează date demo. Pentru știri reale, mergi pe newsdata.io, creează un cont gratuit și înlocuiește NEWS_API_KEY în cod.", source_id: "pulsar-setup", pubDate: new Date().toISOString(), category: ["sistem"], link: "https://newsdata.io" },
    { title: "Actualizarea zilnică la ora 05:00 — cum funcționează", description: "Folosește un GitHub Action programat cu cron '0 5 * * *' care reconstruiește datele și face commit, declanșând automat un nou deploy Netlify.", source_id: "pulsar-setup", pubDate: new Date().toISOString(), category: ["sistem"], link: "#" },
    { title: "Categorie: " + category, description: "Selectează altă categorie din meniul de sus pentru a filtra știrile (după ce API-ul real este conectat).", source_id: "pulsar-setup", pubDate: new Date().toISOString(), category: [category], link: "#" }
  ];
  return base;
}

/* ============ MODAL ============ */
const modalOverlay = document.getElementById('modal-overlay');
function openModal(a){
  document.getElementById('modal-tag').textContent = (a.category && a.category[0]) || currentCategory;
  document.getElementById('modal-title').textContent = a.title;
  document.getElementById('modal-body').textContent = a.description || a.content || 'Fără descriere disponibilă.';
  document.getElementById('modal-link').href = a.link || '#';
  modalOverlay.classList.add('open');
}
document.getElementById('modal-close').addEventListener('click', () => modalOverlay.classList.remove('open'));
modalOverlay.addEventListener('click', (e) => { if(e.target === modalOverlay) modalOverlay.classList.remove('open'); });

/* ============ CATEGORII ============ */
document.getElementById('categories').addEventListener('click', (e) => {
  if(e.target.tagName !== 'BUTTON') return;
  document.querySelectorAll('#categories button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentCategory = e.target.dataset.cat;
  loadNews(currentCategory);
});

document.getElementById('refresh-btn').addEventListener('click', () => loadNews(currentCategory));

/* ============ CHATBOT (Anthropic API) ============ */
const chatToggle = document.getElementById('chat-toggle');
const chatWindow = document.getElementById('chat-window');
const chatMessages = document.getElementById('chat-messages');
const chatInput = document.getElementById('chat-input');

chatToggle.addEventListener('click', () => chatWindow.classList.toggle('open'));
document.getElementById('chat-close').addEventListener('click', () => chatWindow.classList.remove('open'));

document.getElementById('chat-send').addEventListener('click', sendMessage);
chatInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') sendMessage(); });

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    chatInput.value = chip.dataset.q;
    sendMessage();
  });
});

function addMessage(text, sender){
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return div;
}

async function sendMessage(){
  const text = chatInput.value.trim();
  if(!text) return;
  addMessage(text, 'user');
  chatInput.value = '';

  const thinking = addMessage('Se gândește...', 'bot thinking');

  const context = lastArticles.slice(0, 8).map(a => `- ${a.title}`).join('\n');

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [
          {
            role: "user",
            content: `Ești asistentul site-ului de știri Pulsar. Răspunde scurt, prietenos, în română. Iată titlurile știrilor afișate momentan pe site:\n${context}\n\nÎntrebarea utilizatorului: ${text}`
          }
        ]
      })
    });

    const data = await response.json();
    const reply = data.content?.find(c => c.type === 'text')?.text || 'Nu am putut genera un răspuns.';
    thinking.remove();
    addMessage(reply, 'bot');
  } catch(err){
    thinking.remove();
    addMessage('A apărut o eroare de conexiune. Încearcă din nou.', 'bot');
  }
}

/* ============ INIT ============ */
loadNews(currentCategory);
</script>

</body>
</html>
